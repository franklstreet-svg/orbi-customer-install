name: Build Orby installers

# Cross-platform build of the customer-side installer for Win/Mac/Linux.
# Runs on every push to main + on demand from the Actions tab.
# Free for public repos; private repos get 2,000 free minutes/month
# (each build ~5 min × 3 platforms = ~15 min per push).
#
# Artifacts are attached to the workflow run AND, when the push has a
# semver tag (v1.0.0, v1.2.3-beta, etc.), uploaded as a GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'customer_install/**'
      - 'billing/**'
      - '.github/workflows/build-installers.yml'
  workflow_dispatch:  # lets Frank trigger from the Actions tab anytime

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: orby-installer-linux
            artifact_path: customer_install/installer/dist/linux/
          - os: macos-latest
            target: mac
            artifact: orby-installer-mac
            artifact_path: customer_install/installer/dist/mac/
          - os: windows-latest
            target: windows
            artifact: orby-installer-windows
            artifact_path: customer_install/installer/dist/windows/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Install the customer app's own deps so the smoke test can
          # actually import orbi.py — reportlab, flask, etc. Skip pinned
          # constraints quietly: CI just needs to load the modules, not
          # match prod versions exactly.
          if [ -f customer_install/requirements.txt ]; then
            pip install -r customer_install/requirements.txt || true
          fi
        shell: bash

      - name: Build installer (${{ matrix.target }})
        run: python customer_install/installer/build_orbi_installer.py --target ${{ matrix.target }}

      - name: Smoke-test the built installer (Linux + Mac only)
        # The smoke test runs the built PyInstaller binary with --smoke-test,
        # which exercises: extract_app_source, install_python_deps, write_config,
        # bootstrap_owner, AND imports orbi.py under the freshly-created venv
        # python to prove the bundled source + deps actually work together.
        # Windows: skipped because runner doesn't have a way to invoke the
        # nested .exe without UAC and the binary is named differently.
        if: matrix.target != 'windows'
        run: |
          set -e
          if [ "${{ matrix.target }}" = "linux" ]; then
            BIN=customer_install/installer/dist/linux/orbi-installer
          else
            BIN=customer_install/installer/dist/mac/orbi-installer
          fi
          chmod +x "$BIN"
          "$BIN" --smoke-test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # softprops/action-gh-release needs contents:write to create releases;
    # default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show what we got
        run: find artifacts -type f | xargs -I {} ls -la {}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/orby-installer-linux/*
            artifacts/orby-installer-mac/*
            artifacts/orby-installer-windows/*
          generate_release_notes: true
          fail_on_unmatched_files: false
