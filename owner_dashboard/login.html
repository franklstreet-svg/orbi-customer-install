<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orby — Owner Sign In</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/pwa/icons/icon-favicon.png">
  <link rel="apple-touch-icon" href="/pwa/icons/icon-192.png">
  <meta name="theme-color" content="#0b0f1a">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #0b0f1a 0%, #131a2e 100%);
      color: #eaf0ff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px;
      background: #1a2236;
      border: 1px solid #2c3957;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center; font-size: 32px;
      font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .sub {
      text-align: center; color: #8fa3c7;
      font-size: 14px; margin-bottom: 26px;
    }
    label {
      display: block; font-size: 13px;
      color: #b8c6e0; margin-bottom: 6px;
    }
    input[type="email"], input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 14px;
      background: #0f1626; color: #eaf0ff;
      border: 1px solid #2c3957;
      border-radius: 10px; font-size: 15px;
      margin-bottom: 16px;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #4f8cff; }
    button {
      width: 100%; padding: 13px;
      background: #4f8cff; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3a7af0; }
    button:disabled { background: #2c3957; cursor: not-allowed; }
    .error {
      background: rgba(255, 90, 90, 0.12);
      border: 1px solid rgba(255, 90, 90, 0.3);
      color: #ffb0b0; padding: 10px 12px;
      border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .error.show { display: block; }
    .footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: #6b7a99;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Orby</div>
    <div class="sub">Owner sign in</div>

    <div id="error" class="error"></div>

    <form id="login-form">
      <label for="username">Username or Email</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             autocapitalize="off" autocorrect="off" spellcheck="false"
             placeholder="frank, or your email">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">

      <button type="submit" id="submit-btn">Sign in</button>
    </form>

    <div class="footer">
      <a href="#" id="forgot-link" style="color:#9aa4c0;text-decoration:underline">Forgot your password?</a>
    </div>

    <!-- Forgot-password modal -->
    <div id="forgot-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px">
      <div style="background:#131a2e;padding:24px;border-radius:14px;max-width:380px;width:100%">
        <h2 style="margin:0 0 8px;font-size:18px;color:#eaf0ff">Reset your password</h2>
        <p style="color:#9aa4c0;font-size:13px;margin:0 0 16px">
          Enter your email address. We'll send you a one-time link to set a new password. The link expires in 24 hours.
        </p>
        <input type="email" id="forgot-email" placeholder="your@email.com" autocomplete="email"
               style="width:100%;padding:10px;background:#1a2240;color:#eaf0ff;border:1px solid #2c3756;border-radius:6px;box-sizing:border-box">
        <div style="display:flex;gap:8px;margin-top:14px">
          <button type="button" id="forgot-cancel" style="flex:1;padding:10px;background:transparent;border:1px solid #2c3756;color:#9aa4c0;border-radius:6px;cursor:pointer">Cancel</button>
          <button type="button" id="forgot-send" style="flex:2;padding:10px;background:#8b5cf6;border:none;color:white;border-radius:6px;font-weight:600;cursor:pointer">Send reset link</button>
        </div>
        <div id="forgot-msg" style="margin-top:12px;font-size:13px"></div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        // Backend accepts either {username} or {email} — send both so legacy
        // single-owner installs and new multi-user installs both work.
        const identifier = document.getElementById('username').value.trim();
        const res = await fetch('/api/owner/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: identifier,
            email: identifier,
            password: document.getElementById('password').value
          })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Invalid username or password');
        }

        window.location.href = '/owner';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });

    // Forgot-password modal
    const modal = document.getElementById('forgot-modal');
    document.getElementById('forgot-link').addEventListener('click', (e) => {
      e.preventDefault();
      modal.style.display = 'flex';
      setTimeout(() => document.getElementById('forgot-email').focus(), 50);
    });
    document.getElementById('forgot-cancel').addEventListener('click', () => {
      modal.style.display = 'none';
      document.getElementById('forgot-msg').textContent = '';
    });
    document.getElementById('forgot-send').addEventListener('click', async () => {
      const email = document.getElementById('forgot-email').value.trim();
      const msg = document.getElementById('forgot-msg');
      if (!email || !email.includes('@')) {
        msg.style.color = '#ff7a7a';
        msg.textContent = 'Enter a valid email.';
        return;
      }
      msg.style.color = '#9aa4c0';
      msg.textContent = 'Sending…';
      try {
        const r = await fetch('/api/owner/forgot_password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await r.json().catch(() => ({}));
        msg.style.color = '#4ade80';
        msg.textContent = data.message || 'If that email is on file, a reset link has been sent.';
      } catch (e) {
        msg.style.color = '#ff7a7a';
        msg.textContent = 'Request failed. Try again.';
      }
    });
  </script>
</body>
</html>
