<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orby — Owner Sign In</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/pwa/icons/icon-favicon.png">
  <link rel="apple-touch-icon" href="/pwa/icons/icon-192.png">
  <meta name="theme-color" content="#0b0f1a">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #0b0f1a 0%, #131a2e 100%);
      color: #eaf0ff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px;
      background: #1a2236;
      border: 1px solid #2c3957;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center; font-size: 32px;
      font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .sub {
      text-align: center; color: #8fa3c7;
      font-size: 14px; margin-bottom: 26px;
    }
    label {
      display: block; font-size: 13px;
      color: #b8c6e0; margin-bottom: 6px;
    }
    input[type="email"], input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 14px;
      background: #0f1626; color: #eaf0ff;
      border: 1px solid #2c3957;
      border-radius: 10px; font-size: 15px;
      margin-bottom: 16px;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #4f8cff; }
    button {
      width: 100%; padding: 13px;
      background: #4f8cff; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3a7af0; }
    button:disabled { background: #2c3957; cursor: not-allowed; }
    .error {
      background: rgba(255, 90, 90, 0.12);
      border: 1px solid rgba(255, 90, 90, 0.3);
      color: #ffb0b0; padding: 10px 12px;
      border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .error.show { display: block; }
    .footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: #6b7a99;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Orby</div>
    <div class="sub">Owner sign in</div>

    <div id="error" class="error"></div>

    <form id="login-form">
      <label for="username">Username or Email</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             autocapitalize="off" autocorrect="off" spellcheck="false"
             placeholder="frank, or your email">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">

      <button type="submit" id="submit-btn">Sign in</button>
    </form>

    <div class="footer">Forgot your password? Ask Frank to reset it.</div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        // Backend accepts either {username} or {email} — send both so legacy
        // single-owner installs and new multi-user installs both work.
        const identifier = document.getElementById('username').value.trim();
        const res = await fetch('/api/owner/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: identifier,
            email: identifier,
            password: document.getElementById('password').value
          })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Invalid username or password');
        }

        window.location.href = '/owner';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
