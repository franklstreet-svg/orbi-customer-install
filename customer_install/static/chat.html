<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Orby</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <meta name="theme-color" content="#0b0f1a">
  <link rel="apple-touch-icon" href="/pwa/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/pwa/icons/icon-favicon.png">
  <link rel="stylesheet" href="/static/chat.css">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Landing area shown when chat is closed.
       In Phase 2 this becomes the customer's branded site. For now it's a clean
       placeholder so the page never looks empty when the chat is hidden. -->
  <main class="landing">
    <div class="landing-card">
      <div class="landing-logo"></div>
      <h1 id="landing-business">Welcome</h1>
      <p id="landing-tagline">Tap the chat button to talk to our AI assistant.</p>
    </div>
  </main>

  <!-- Floating launcher button (always visible) -->
  <button id="orbi-launcher" class="orbi-launcher" aria-label="Open chat with Orby">
    <svg class="launcher-icon-chat" viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M20 2H4a2 2 0 0 0-2 2v16l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zM7 9h10v2H7V9zm0 4h7v2H7v-2z"/>
    </svg>
    <svg class="launcher-icon-close" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
    <span class="launcher-badge" id="launcher-badge" hidden>1</span>
  </button>

  <!-- Chat panel -->
  <section id="orbi-panel" class="orbi-panel" aria-hidden="true">
    <header class="orbi-header">
      <div class="brand">
        <div class="avatar" id="orbi-avatar"></div>
        <div class="brand-text">
          <div class="business" id="business-name">Loading...</div>
          <div class="status" id="connection-status">● Online</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clear-btn" title="Clear chat" aria-label="Clear chat">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
        <button class="toggle-btn" id="speaker-toggle" aria-pressed="false"
                title="Speaker (off)" aria-label="Toggle speaker">
          <svg class="icon-speaker-on"  viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06A7 7 0 0 1 14 18.71v2.06A9 9 0 0 0 14 3.23z"/></svg>
          <svg class="icon-speaker-off" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.96 8.96 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73 12 10.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
        <button class="toggle-btn" id="mic-toggle" aria-pressed="false"
                title="Microphone (off)" aria-label="Toggle microphone">
          <svg class="icon-mic-on"  viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
          <svg class="icon-mic-off" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zM14.98 11.17c0-.06.02-.11.02-.17V5a3 3 0 0 0-5.94-.6L14.98 11.17zM4.27 3L3 4.27l6.01 6.01V11a3 3 0 0 0 4.49 2.6l1.55 1.55A4.94 4.94 0 0 1 12 16a5 5 0 0 1-5-5H5a7 7 0 0 0 6 6.92V21h2v-3.08c.93-.13 1.79-.46 2.55-.95l4.18 4.18L21 19.73 4.27 3z"/></svg>
        </button>
        <button class="icon-btn" id="panel-close" aria-label="Close chat">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="orbi-state-bar" id="state-bar" hidden></div>

    <main class="chat-area" id="chat-area">
      <div class="welcome" id="welcome">
        <div class="welcome-bubble">
          <h2 id="welcome-title">Hi! How can I help?</h2>
          <p id="welcome-sub">Ask me anything — hours, services, prices, or anything else.</p>
        </div>
        <div class="quick-actions" id="quick-actions"></div>
      </div>
    </main>

    <button class="scroll-to-bottom" id="scroll-bottom-btn" aria-label="Scroll to bottom" hidden>
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
      </svg>
      <span class="scroll-badge" id="scroll-bottom-badge" hidden>1</span>
    </button>

    <footer class="composer">
      <textarea id="input" placeholder="Type a message..." rows="1" autocomplete="off"
                autocorrect="on" autocapitalize="sentences"
                inputmode="text" enterkeyhint="send"></textarea>
      <button class="send-btn" id="send-btn" aria-label="Send" disabled>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </footer>
  </section>

  <script src="/pwa/install-prompt.js"></script>
  <script src="/static/chat.js"></script>
</body>
</html>
